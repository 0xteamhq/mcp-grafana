name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the version-bump commit can trigger downstream workflows.
          # Falls back to GITHUB_TOKEN if the secret is not set.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: version
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Keep the CLI --version flag in sync
          sed -i "s/\.version('[^']*')/\.version('$NEW_VERSION')/" src/cli.ts

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --passWithNoTests

      - name: Generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: CHANGELOG.md
          skip-version-file: true  # already bumped above
          skip-commit: true        # we commit everything together below
          skip-tag: true           # we tag after the commit below
          skip-on-empty: false
          skip-git-pull: true      # avoid detached HEAD error on CI

      - name: Commit, tag, and push
        run: |
          git add package.json package-lock.json src/cli.ts CHANGELOG.md
          git commit -m "chore(release): v${{ steps.version.outputs.new_version }} [skip ci]"
          git tag -a "v${{ steps.version.outputs.new_version }}" \
            -m "Release v${{ steps.version.outputs.new_version }}"
          git push origin main --follow-tags

      - name: Pack npm tarball
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          draft: false
          prerelease: false
          files: '*.tgz'

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
