version: "3.9"

services:
  grafana:
    image: grafana/grafana:11.3.0
    container_name: mcp-grafana-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Allow service account token creation via API
      GF_FEATURE_TOGGLES_ENABLE: accessTokenExpirationCheck
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - mcp-net

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: mcp-grafana-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - mcp-net

  # Bootstraps a service account + token, then starts the MCP server
  mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mcp-grafana-mcp
    depends_on:
      grafana:
        condition: service_healthy
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_ADMIN_USER: admin
      GRAFANA_ADMIN_PASSWORD: admin
      # Governance flags (override via env or CLI in entrypoint)
      MCP_READ_ONLY: "false"
      MCP_DRY_RUN: "false"
      MCP_AUDIT_LOG: /var/log/mcp-grafana/audit.log
      MCP_WRITE_RATE_LIMIT: "10"
    volumes:
      - mcp_logs:/var/log/mcp-grafana
    networks:
      - mcp-net
    stdin_open: true
    tty: true

volumes:
  grafana_data:
  mcp_logs:

networks:
  mcp-net:
    driver: bridge
